<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#06100C"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#mesh)" opacity="0.15"/>
  <defs>
    <radialGradient id="mesh" cx="70%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#00D97E"/>
      <stop offset="100%" stop-color="#06100C"/>
    </radialGradient>
  </defs>
  <!-- logo -->
  <text x="80" y="120" 
    font-family="Georgia,serif" 
    font-size="72" 
    font-weight="900" 
    fill="#ffffff"
    letter-spacing="-3">eixo</text>
  <circle cx="340" cy="100" r="9" fill="#00D97E"/>
  <!-- headline -->
  <text x="80" y="280" 
    font-family="Georgia,serif" 
    font-size="80" 
    font-weight="900" 
    fill="#ffffff"
    letter-spacing="-4">Mais lucro.</text>
  <text x="80" y="380" 
    font-family="Georgia,serif" 
    font-size="80" 
    font-weight="900" 
    fill="#00D97E"
    letter-spacing="-4">Menos desperdício.</text>
  <!-- sub -->
  <text x="80" y="470" 
    font-family="Arial,sans-serif" 
    font-size="32" 
    font-weight="400" 
    fill="rgba(255,255,255,0.55)"
    letter-spacing="-0.5">Sistemas reais para PMEs. Resultado em 7 dias.</text>
  <!-- url -->
  <text x="80" y="580" 
    font-family="monospace" 
    font-size="24" 
    fill="rgba(255,255,255,0.25)"
    letter-spacing="1">eixo.me</text>
</svg>